name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/ scripts/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run unit tests (no MIMIC-IV data required)
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_extract.py \
            --ignore=tests/test_features.py \
            --ignore=tests/test_timeseries.py \
            --ignore=tests/test_integration.py \
            -k "not preprocess_pipeline" \
            --timeout=300

  manuscript-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check manuscript word count
        run: |
          total=0
          for f in manuscript/0{1,2,3,4}_*.md; do
            if [ -f "$f" ]; then
              words=$(wc -w < "$f")
              echo "$f: $words words"
              total=$((total + words))
            fi
          done
          echo "---"
          echo "Total (Intro+Methods+Results+Discussion): $total words"
          if [ "$total" -gt 5000 ]; then
            echo "::warning::Manuscript body is $total words. JAMIA limit is ~4,000."
          fi
      - name: Check for remaining placeholders
        run: |
          if grep -r '\[XX\.' manuscript/*.md 2>/dev/null; then
            echo "::error::Found placeholder values in manuscript!"
            exit 1
          fi
          echo "No placeholders found."
